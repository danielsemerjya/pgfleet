[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
result_format = yaml          # pretty YAML output via the built-in default callback
interpreter_python = auto_silent
# Uncomment to avoid typing the vault password every run (.vault_pass is gitignored).
# Otherwise pass --ask-vault-pass / --vault-password-file on the command line.
# vault_password_file = .vault_pass

[privilege_escalation]
become = True
become_method = sudo
